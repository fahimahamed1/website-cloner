name: Run Website Cloner with Cloudflare Tunnel

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Duration in minutes'
        required: true
        default: '60'

jobs:
  run-cloner:
    runs-on: ubuntu-latest
    timeout-minutes: 65

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Cloudflare Tunnel
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      # START SERVER FIRST
      - name: Start Server
        run: |
          npm start > server.log 2>&1 &
          echo "Waiting for server..."
          for i in {1..20}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "✅ Server running"
              break
            fi
            sleep 2
          done

      # START TUNNEL
      - name: Start Cloudflare Tunnel
        run: |
          cloudflared tunnel --url http://localhost:3000 > tunnel.log 2>&1 &
          echo "Waiting for tunnel URL..."

          for i in {1..30}; do
            PUBLIC_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' tunnel.log | head -n 1)
            if [ ! -z "$PUBLIC_URL" ]; then
              echo "Tunnel URL found!"
              break
            fi
            sleep 2
          done

          echo "PUBLIC_URL=$PUBLIC_URL" >> $GITHUB_ENV

          echo "### 🌐 Public Access URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**$PUBLIC_URL**" >> $GITHUB_STEP_SUMMARY

      - name: Run for duration
        run: |
          DURATION=${{ github.event.inputs.duration || '60' }}
          END_TIME=$(($(date +%s) + DURATION * 60))

          while [ $(date +%s) -lt $END_TIME ]; do
            REMAINING=$((END_TIME - $(date +%s)))

            echo "⏱️ Remaining: $((REMAINING / 60))m $((REMAINING % 60))s"

            curl -s http://localhost:3000 > /dev/null && echo "✅ Server healthy" || echo "⚠️ Server down"
            pgrep -f cloudflared > /dev/null && echo "✅ Tunnel active" || echo "⚠️ Tunnel down"

            sleep 300
          done

      - name: Stop services
        if: always()
        run: |
          pkill -f cloudflared || true
          pkill -f node || true

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: |
            tunnel.log
            server.log
          retention-days: 1

      - name: Summary
        run: |
          echo "## Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration**: ${{ github.event.inputs.duration || '60' }} minutes" >> $GITHUB_STEP_SUMMARY
          echo "- **Completed**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ env.PUBLIC_URL }}" >> $GITHUB_STEP_SUMMARY